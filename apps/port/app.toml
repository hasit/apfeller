id = "port"
version = "0.1.0"
summary = "Show what is using a local port."
description = "Inspect a local TCP port with lsof and show listeners by default or all sockets with --all."
command = "port"
kind = "local-command"
requires_commands = ["lsof"]
supported_shells = ["fish", "zsh"]

[help]
usage = "port [OPTIONS] PORT_NUMBER"
examples = ["port 3000", "port -a 5432"]

[input]
mode = "single"
name = "port"
required = true

[[args]]
name = "all"
type = "flag"
long = "all"
short = "a"
description = "Show all sockets not just listeners"

[output]
mode = "local_passthrough"

[hooks]
local_run = "hooks/local_run.sh"
